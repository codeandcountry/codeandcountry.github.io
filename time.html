<html>
	<head>
		<!-- jquery -->
		<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.2.0/jquery.min.js" crossorigin="anonymous"></script>

		<!-- Latest compiled and minified CSS -->
		<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css" integrity="sha384-1q8mTJOASx8j1Au+a5WDVnPi2lkFfwwEAa8hDDdjZlpLegxhjVME1fgjWPGmkzs7" crossorigin="anonymous">

		<!-- Optional theme -->
		<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap-theme.min.css" integrity="sha384-fLW2N01lMqjakBkx3l/M9EahuwpSfeNvV63J5ezn3uZzapT0u7EYsXMjQV+0En5r" crossorigin="anonymous">

		<!-- Latest compiled and minified JavaScript -->
		<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/js/bootstrap.min.js" integrity="sha384-0mSbJDEHialfmuBBQP6A4Qrprq5OVfW37PRR3j5ELqxss1yVqOtnepnHVP9aJ7xS" crossorigin="anonymous"></script>

		<!-- CDNJS :: Sortable (https://cdnjs.com/) -->
		<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.4.2/Sortable.min.js"></script>

		<!-- FontAwesome -->
		<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css">

		<style>
			.wrapper{
				width: 500px;
				margin: 20px auto;
			}

			.list-group-item{
				position: relative;
			}

			.list-group-item:after{
				
			}

			.list-group-item input{
				display: none;
			}

			.list-group-item.hours{
				border-left: 5px solid rgba(105, 180, 199, 1);
			}

			.list-group-item.hours input.hours-input{
				display: inline;
			}

			.list-group-item.sortable{
				cursor: move;
			}

			.list-group-item.choose input.chosen{
				display: inline;
			}

			.list-group-item.sortable:after{
				content:"\f142";
				font-family: FontAwesome;
				position: absolute;
				right: 9px;
			    top: 8px;
			    font-size: 1.3em;

			}

			#hours-left-summary{
				display: none;
			}

			.hours-input, .chosen{
				float:right;
			}

			.ghost{
				background-color: #69b4c7;
				color: #fff;
				opacity: 0.5;
			}

			#unchosen{
				display: none;
				padding-left: 0;
			}

			#unchosen li{
				border-left: 5px solid #ed7070;
			}
		</style>
	</head>

	<body>
		<section class="wrapper">
			<h3 id="title">Select 5 activities that are important this week:</h3>
			<h4 id="hours-left-summary">Hours remaining to assign: <span id="hours-left"></span> </h4>
			<!-- Simple List -->
			<ul id="simpleList" class="list-group">
			    <li class="list-group-item choose">My Side Business <input type="checkbox" class="chosen"/> <input class="hours-input" type="text"/></li>
			    <li class="list-group-item choose">Time with my kids <input type="checkbox" class="chosen"/> <input class="hours-input" type="text"/></li>
			    <li class="list-group-item choose">Time with my spouse <input type="checkbox" class="chosen"/> <input class="hours-input" type="text"/></li>
			    <li class="list-group-item choose">Housework <input type="checkbox" class="chosen"/> <input class="hours-input" type="text"/></li>
			    <li class="list-group-item choose">Workout <input type="checkbox" class="chosen"/> <input class="hours-input" type="text"/></li>
			    <li class="list-group-item choose">Time with Friends  <input type="checkbox" class="chosen"/> <input class="hours-input" type="text"/></li>
			    <li class="list-group-item choose">Grocery Shopping <input type="checkbox" class="chosen"/> <input class="hours-input" type="text"/></li>
			    <li class="list-group-item choose">Running Errands <input type="checkbox" class="chosen"/> <input class="hours-input" type="text"/></li>
			    <li class="list-group-item choose">Spiritual Growth <input type="checkbox" class="chosen"/> <input class="hours-input" type="text"/></li>
			    <li class="list-group-item choose">Personal Development <input type="checkbox" class="chosen"/> <input class="hours-input" type="text"/></li>
			    <li class="list-group-item choose">Herding Cats <input type="checkbox" class="chosen"/> <input class="hours-input" type="text"/></li>
			</ul>

			<ul id="unchosen">
			</ul>

			<button class="next">Next</button>
		</section>

		<script>
			var CHOOSE_ACTIVITIES = 1;
			var PRIORITIZE_ACTIVITIES = 2;
			var ASSIGN_HOURS = 3;
			var DISPLAY_RESULTS = 4;

			var list;
			var hours = 20;
			var step = CHOOSE_ACTIVITIES;

			function filterList(){
			    //$('.list-group-item').hide();
			    $(".chosen").each(function() {
			        //console.log($(this).parent());
			        if (!$(this).is(':checked')){
			        	$('#unchosen').append($(this).parent());
			        }
			    });
			}
			function enableList(){
		    	// Simple list
		    	list = Sortable.create(simpleList, { ghostClass: "ghost" });
		    	$('.list-group-item').addClass('sortable');
			}
			function disableList(){
				list.destroy();
				$('.list-group-item').removeClass('sortable');
			}
			function showHours(){
				$('#simpleList .list-group-item').each(function (index, value) { 
				  $(this).addClass('hours');
				});
			}
			function updateHours(){
				var hoursLeft = hours;
				$('.list-group-item .hours-input').each(function (index, value) { 
				  hoursLeft = hoursLeft - $(this).val();
				});
				console.log(hoursLeft);

				$('#hours-left').html(hoursLeft);
			}

			$('.next').on('click', function(){
				switch(step) {
				    case CHOOSE_ACTIVITIES:
				    	$('#title').html('Prioritize them');
				    	$('.list-group-item').removeClass('choose');
				    	filterList();
				    	enableList();
				        step = PRIORITIZE_ACTIVITIES;
				        break;
				    case PRIORITIZE_ACTIVITIES:
				        $('#title').html('Assign Hours');
						$('#hours-left-summary').show();
						disableList();
						showHours();
						updateHours();
						step = ASSIGN_HOURS;
				        break;
				    case ASSIGN_HOURS:
				    	$('#title').html('Your Plan');
				    	$('#hours-left-summary').hide();
				    	$('#unchosen').show();
				    	$('.next').hide();
				    	step = DISPLAY_RESULTS;
				    	break;
				    case DISPLAY_RESULTS:
				    	break;
				    default:
				        break;
				}
				
			});

			$('.hours-input').on('change', function(){
				updateHours();
			});
		</script>

	</body>


</html>
