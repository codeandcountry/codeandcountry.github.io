<html>
	<head>

		<!-- Optional theme -->
		<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap-theme.min.css" integrity="sha384-fLW2N01lMqjakBkx3l/M9EahuwpSfeNvV63J5ezn3uZzapT0u7EYsXMjQV+0En5r" crossorigin="anonymous">

		<!-- Latest compiled and minified JavaScript -->
		<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/js/bootstrap.min.js" integrity="sha384-0mSbJDEHialfmuBBQP6A4Qrprq5OVfW37PRR3j5ELqxss1yVqOtnepnHVP9aJ7xS" crossorigin="anonymous"></script>

		<!-- jQueryUI -->
		<script src="https://code.jquery.com/ui/1.11.4/jquery-ui.min.js"></script>
		<link rel="stylesheet" href="https://code.jquery.com/ui/1.11.4/themes/smoothness/jquery-ui.css">

		<!-- FontAwesome -->
		<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css">

		<!-- time -->
		<script src="assets/js/time.js"></script>

		<style>
			.colors{
				//#E3E3E3 - light grey
				//#6E7386 - mid grey
				//#585E6C - dark grey
				//#E8804B - orange

			}

			.remaining-wrapper{
				background-color: #03C5BC;
				color: #fff;
				padding: 1em;
			}

			.remaining-title{
				text-align: center;
				font-size: 1em;
				margin-top: 0;
			}
  			.resizable { 
  				width: 150px; height: 35px; padding: 0.5em; 
  				//background: rgba(105, 180, 199, 1);
  				background: #585E6C;
  				color: #fff;
  				margin-bottom: 10px;
  				float: left;
  			}
  			.resizable h3 { text-align: center; margin: 0; font-size: 1.2em; }

  			.overbudget .resizable{
  				//background: #ed7070;
  			}

  			.zero .resizable{
  				//background: #b2a0c8;
  				//background: #5cb85c;
  			}

  			.ui-icon, .ui-widget-content .ui-icon{
  				background: none;
  			}

  			.allocation-value{
  				display:block;
  				float:left;
  				margin-left: -16px;
  				background-color: #6E7386;
  				height: 35px;
  				width: 35px;
  				border-radius: 17.5px;
  				z-index: 2;
    			position: relative;
    			text-align: center;
    			padding-top: 6px;
    			color: #9EF0EC;
  			}

  			.allocation-wrapper{
  				clear: both;
  			}

  			.allocation-name{
  				font-size: 12px;
  				padding-left: 20px;
  				text-transform: uppercase;
  				color: #6E7386;
  			}

  			#remaining{
  				font-size: 100px;
  				text-align: center;
  				display: block;
  			}

  			.controls{
  				display: block;
  				clear: both;
  				text-align: center;
				padding: 20px;
  			}

  			.add-new{
  				clear: both;
  				background: #E3E3E3;
  				padding: 20px 10px;
  			}

  			.add-new input{
  				padding: 5px;
  				width: 35%;
  			}

  			.btn.primary{
  				background: #E8804B;
  				border-radius: 0;
  			}

  			.btn.secondary{
  				background: #E3E3E3;
  				border-radius: 0;
  				text-transform: uppercase;
  			}

  		</style>
	</head>

	<body>
		<section class="wrapper">
			<div class="remaining-wrapper">
				<h2 class="remaining-title">Time remaining to budget</h2>
				<span id="remaining">0</span>
			</div>

			<div id="graph-wrapper"></div>

			<div class="add-new">
				<input type="text" id="add-name" placeholder="Add Activity"/>
				<input type="text" id="add-hours" placeholder="# of Hours"/>
				<button type="button" class="btn primary" id="add-item">add it</button>
			</div>

			<div class="controls">
				<button type="button" class="btn secondary" id="sleep-toggle">Show/Hide Sleep</button>
				<button type="button" class="btn secondary" id="work-toggle">Show/Hide Work</button>
			</div>
		</section>

	</body>


</html>
